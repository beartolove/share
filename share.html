<script>
const entries = [{"dateRaw": "20260711", "date": "2026-07-11", "title": "iMandalart 2.0：手機九宮格思考卡 Skill", "file": "20260711_iMandalart_2_0_Mobile_Mandala_Skill.html", "url": "https://share.beartolove.com/20260711_iMandalart_2_0_Mobile_Mandala_Skill.html", "category": "科技及AI新知"}, {"dateRaw": "20260710", "date": "2026-07-10", "title": "GPT-5.6 與 ChatGPT Work：AI 進入工作流時代", "file": "20260710_GPT_5_6_ChatGPT_Work_Workflow_Era.html", "url": "https://share.beartolove.com/20260710_GPT_5_6_ChatGPT_Work_Workflow_Era.html", "category": "科技及AI新知"}, {"dateRaw": "20260707", "date": "2026-07-07", "title": "AI 知識工作流 10 個關鍵字", "file": "20260707_AI_Knowledge_Workflow_10_Keywords.html", "url": "https://share.beartolove.com/20260707_AI_Knowledge_Workflow_10_Keywords.html", "category": "科技及AI新知"}, {"dateRaw": "20260706", "date": "2026-07-06", "title": "去 AI 味十大 Skill 榜", "file": "20260706_De_AI_Top_10_Agent_Skills.html", "url": "https://share.beartolove.com/20260706_De_AI_Top_10_Agent_Skills.html", "category": "科技及AI新知"}, {"dateRaw": "20260706", "date": "2026-07-06", "title": "S-Team 簡報工作室", "file": "20260706_S_Team_Presentation_Studio.html", "url": "https://share.beartolove.com/20260706_S_Team_Presentation_Studio.html", "category": "科技及AI新知"}, {"dateRaw": "20260706", "date": "2026-07-06", "title": "Obsidian 個人知識庫 10 個實用功能", "file": "20260706_Obsidian_Personal_Knowledge_Base_10_Features.html", "url": "https://share.beartolove.com/20260706_Obsidian_Personal_Knowledge_Base_10_Features.html", "category": "科技及AI新知"}, {"dateRaw": "20260706", "date": "2026-07-06", "title": "Deep Memory 記憶儀表板", "file": "20260706_Deep_Memory_Knowledge_Dashboard.html", "url": "https://share.beartolove.com/20260706_Deep_Memory_Knowledge_Dashboard.html", "category": "科技及AI新知"}, {"dateRaw": "20260705", "date": "2026-07-05", "title": "望安之星停航爭議", "file": "20260705_Wangan_Star_Sailing_Suspension_Dispute.html", "url": "https://share.beartolove.com/20260705_Wangan_Star_Sailing_Suspension_Dispute.html", "category": "航運相關"} let mode = localStorage.getItem('share-index-mode') || 'category';
let order = localStorage.getItem('share-index-order') || 'desc';
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function cmp(a,b){const av=mode==='date'?a.dateRaw:a.category+a.dateRaw+a.title;const bv=mode==='date'?b.dateRaw:b.category+b.dateRaw+b.title;return order==='asc'?av.localeCompare(bv,'zh-Hant'):bv.localeCompare(av,'zh-Hant');}
function groupBy(list,key){return list.reduce((acc,item)=>{(acc[item[key]] ||= []).push(item);return acc;},{});}
function itemHtml(e){return `<li class="item"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a><a class="url" href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.url)}</a></li>`;}
function render(){
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
  document.getElementById('order-'+order).classList.add('active');
  const sorted=[...entries].sort(cmp);
  const root=document.getElementById('indexRoot');
  if(!sorted.length){root.innerHTML='<section><p class="empty">目前尚無分享頁。</p></section>';return;}
  if(mode==='date'){
    const groups=groupBy(sorted,'date');
    root.innerHTML=Object.keys(groups).map(date=>`<section><h2>${esc(date)}</h2><ul>${groups[date].map(itemHtml).join('')}</ul></section>`).join('');
  } else {
    const groups=groupBy(sorted,'category');
    root.innerHTML=Object.keys(groups).map(cat=>{
      const byDate=groupBy(groups[cat].sort((a,b)=>order==='asc'?a.dateRaw.localeCompare(b.dateRaw):b.dateRaw.localeCompare(a.dateRaw)),'date');
      return `<section><h2>#${esc(cat)}</h2>${Object.keys(byDate).map(date=>`<div class="date-block"><h3>${esc(date)}</h3><ul>${byDate[date].map(itemHtml).join('')}</ul></div>`).join('')}</section>`;
    }).join('');
  }
}
function setMode(v){mode=v;localStorage.setItem('share-index-mode',mode);render();}
function setOrder(v){order=v;localStorage.setItem('share-index-order',order);render();}
(function(){const key='myhermes-reader-font-scale';const root=document.documentElement;function apply(v){root.style.setProperty('--reader-font-scale',v.toFixed(2)+'em');}window.toggleReaderMenu=function(){document.getElementById('readerControls')?.classList.toggle('open');};window.adjustReaderFont=function(delta){let v=parseFloat(localStorage.getItem(key)||'1');v=Math.max(0.8,Math.min(1.6,v+delta));localStorage.setItem(key,String(v));apply(v);};window.resetReaderFont=function(){localStorage.removeItem(key);apply(1);};document.addEventListener('click',e=>{const c=document.getElementById('readerControls');if(c&&!c.contains(e.target))c.classList.remove('open');});apply(parseFloat(localStorage.getItem(key)||'1'));})();
render();
</script>
